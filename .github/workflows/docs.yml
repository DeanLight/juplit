name: Deploy Docs

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-caching: true
      - run: uv sync --all-groups
      # .ipynb under docs/ is gitignored; generate from paired .py before mkdocs-jupyter runs
      - run: uv run poe nb
      - run: uv run mkdocs gh-deploy --force
